name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install landing dependencies
        run: npm install --prefix landing --no-package-lock --legacy-peer-deps

      - name: Build site
        run: npm run build

      - name: Deploy to W7S
        uses: w7s-io/w7s-cloud@v1
        with:
          token: ${{ github.token }}
