name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            landing/package.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Install landing dependencies
        run: npm install --prefix landing --no-package-lock --legacy-peer-deps --prefer-offline

      - name: Build site
        run: npm run build

      - name: Deploy to W7S
        uses: w7s-io/w7s-cloud@v1
        with:
          token: ${{ github.token }}
          deploy-timeout: 300
          telegram-chat-id: "-5057216465"
